# SDF4J Configuration File
# SDF4J 配置文件
# OpenHitls SDF4J - Java binding for GM/T 0018-2023 SDF
#
# 注意：此文件由 Maven 在编译时生成
# Note: This file is generated by Maven at build time
#
# 编译时可通过以下方式指定库配置：
# Build-time configuration via Maven properties:
#   mvn clean package -Dsdf.library.name=gmapi -Dsdf.library.path=/opt/sdf/lib
#
# 运行时可通过以下方式覆盖：
# Runtime override via system properties:
#   java -Dsdf4j.library.name=xxx -Dsdf4j.library.path=xxx ...

# ============================================================================
# SDF Library Configuration / SDF库配置
# ============================================================================

# Library Name (Required) / 库名称（必填）
# 不含 lib 前缀和 .so/.dll/.dylib 后缀
# Without 'lib' prefix and '.so/.dll/.dylib' suffix
#
# 编译时设置的值: ${sdf.library.name}
# Build-time value: ${sdf.library.name}
#
# 示例/Examples:
#   - 如果库文件是 libsdf.so，值应为: sdf
#   - 如果库文件是 libswsds.so，值应为: swsds
#   - 如果库文件是 libgmapi.so，值应为: gmapi
library.name=${sdf.library.name}

# Library Path (Optional) / 库路径（可选）
# 指定库文件所在的目录（不含文件名）
# Specify the directory containing the library file (without filename)
#
# 编译时设置的值: ${sdf.library.path}
# Build-time value: ${sdf.library.path}
#
# 如果为空: 将在系统默认路径查找 (如 /usr/lib, /usr/local/lib 等)
# If empty: will search in system default paths (e.g., /usr/lib, /usr/local/lib, etc.)
#
# 示例/Examples:
#   library.path=/opt/sdf/lib
#   library.path=/usr/local/lib
#   library.path=C:\\Program Files\\SDF\\lib
library.path=${sdf.library.path}
