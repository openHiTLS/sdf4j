# SDF4J Test Configuration
# =========================
# This file configures test environment settings for SDF4J examples.

# SM2 Internal Key Configuration
# --------------------------------
# Internal key index for SM2 sign/verify operations
sm2.internal.key.index=1

# Password to obtain private key access right
# Note: This is device-specific. Change according to your device configuration.
sm2.key.access.password=123abc!@

# SM2 default user ID (as specified in GM/T 0009-2012)
# For most cases, this should be "1234567812345678"
sm2.default.user.id=1234567812345678

# SM4 Internal Key Configuration
# --------------------------------
# Internal key index for SM4 symmetric operations (KEK index)
sm4.internal.key.index=4

# Environment Information
# ------------------------
# Environment name for logging purposes
environment.name=default

# Notes:
# 1. Key indices should match the keys provisioned in your SDF device
# 2. If your device doesn't require password for key access, the password field will be ignored
# 3. Edit these values according to your device configuration before running tests
